<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dojo Ponce MMA">
<meta name="theme-color" content="#0a0804">
<title>Dojo Ponce MMA — Asistencia</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0c040;--bg:#0a0804;--bg-card:#1a1208;--green:#27ae60;--border-gold:rgba(201,168,76,0.3);--text-light:#e8d5a0;--text-muted:#7a6a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text-light);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column}
#header{background:linear-gradient(135deg,#1a0e00,#2a1506);border-bottom:2px solid var(--border-gold);padding:.6rem 1rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 4px 20px rgba(0,0,0,.8)}
#header img{width:45px;height:45px;object-fit:contain}
#header h1{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold-light)}
#header p{font-size:.6rem;letter-spacing:.2em;color:var(--text-muted)}
#nav{background:linear-gradient(180deg,#120a02,#0a0500);border-bottom:1px solid var(--border-gold);padding:.5rem;display:flex;gap:.4rem;justify-content:center}
.nb{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.06em;padding:.4rem .9rem;border:none;border-radius:8px;cursor:pointer;text-transform:uppercase}
.nb-asist{background:linear-gradient(135deg,#1a3a7a,#0d2050);color:#7ab4ff}
.nb-memb{background:linear-gradient(135deg,#5a1a8a,#3a0a5a);color:#cc88ff}
.nb.active{filter:brightness(1.3);transform:scale(1.05)}
#main{padding:.8rem;max-width:500px;margin:0 auto;width:100%;flex:1}
.mod{display:none}.mod.act{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:linear-gradient(135deg,var(--bg-card),#150f06);border:1px solid var(--border-gold);border-radius:12px;padding:1.1rem;margin-bottom:.9rem}
.ct{font-family:'Cinzel',serif;color:var(--gold);font-size:.85rem;letter-spacing:.1em;margin-bottom:.9rem;padding-bottom:.4rem;border-bottom:1px solid var(--border-gold)}
.sbar{display:flex;gap:.4rem;margin-bottom:.5rem}
.sbar input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border-gold);border-radius:8px;padding:.6rem .8rem;color:var(--text-light);font-family:'Rajdhani',sans-serif;font-size:.95rem}
.sbar input:focus{outline:none;border-color:var(--gold)}
.btn{font-family:'Rajdhani',sans-serif;font-weight:700;padding:.55rem 1.1rem;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;display:inline-flex;align-items:center;gap:.3rem}
.bs{background:linear-gradient(135deg,#1e6b30,#145020);color:#7fff9a}
.bsr{background:linear-gradient(135deg,#1a3a7a,#0d2050);color:#7ab4ff}
.bc{background:linear-gradient(135deg,#8b0000,#5a0000);color:#ff9999}
#welcome{background:linear-gradient(135deg,#0d2a0d,#051505);border:2px solid rgba(39,174,96,.5);border-radius:16px;padding:1.8rem;text-align:center;max-width:400px;margin:0 auto;animation:wp .4s ease}
@keyframes wp{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
#welcome h2{font-family:'Cinzel',serif;color:#2ecc71;font-size:1.4rem;margin:.4rem 0}
.motiv{color:var(--gold-light);font-style:italic;margin-top:.8rem;font-size:.9rem;line-height:1.5}
.kbox{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:10px;padding:.7rem 1rem;text-align:center}
.kbox.gold{background:rgba(201,168,76,.1);border-color:var(--border-gold)}
.kbox p:first-child{color:#27ae60;font-size:.67rem;letter-spacing:.1em}
.kbox.gold p:first-child{color:var(--gold)}
.kbox .val{font-family:'Cinzel',serif;font-size:1.8rem;color:#2ecc71}
.kbox.gold .val{color:var(--gold-light);font-size:1rem}
.mc{background:linear-gradient(135deg,#1a1208,#0d0804);border:2px solid var(--gold);border-radius:16px;padding:1.4rem;text-align:center}
.mc h2{font-family:'Cinzel',serif;color:var(--gold-light);margin:.4rem 0}
.mdays{font-family:'Cinzel',serif;font-size:2.5rem;color:#2ecc71}
.mdays.urg{color:#e74c3c;animation:blk 1s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.5}}
.sb{padding:.2rem .55rem;border-radius:12px;font-size:.68rem;font-weight:700}
.sa{background:rgba(39,174,96,.2);color:#2ecc71;border:1px solid rgba(39,174,96,.4)}
.se{background:rgba(243,156,18,.2);color:#f39c12;border:1px solid rgba(243,156,18,.4)}
.sv{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid rgba(231,76,60,.4)}
#toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#1a6b2a,#0d4a1a);border:1px solid rgba(39,174,96,.5);color:#7fff9a;padding:.65rem 1.4rem;border-radius:30px;font-weight:600;z-index:9000;transition:transform .4s;font-size:.88rem;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{background:linear-gradient(135deg,#6b0000,#3a0000);border-color:rgba(231,76,60,.5);color:#ff9999}
/* MODO ALUMNO: ocultar cualquier modal de admin que pueda inyectarse */
.modal-overlay,.modal-wa,#modal-wa,#avisos-wa,[id*="avisos"],[id*="whatsapp"],[class*="modal-overlay"]{display:none!important}
</style>
</head>
<body>
<header id="header">
  <img id="logo-img" src="" alt="Dojo Ponce MMA">
  <div><h1>DOJO PONCE MMA</h1><p>SISTEMA DE ASISTENCIA</p></div>
</header>
<nav id="nav">
  <button class="nb nb-asist active" onclick="showMod('asist',this)">✅ ASISTENCIA</button>
  <button class="nb nb-memb" onclick="showMod('memb',this)">🪪 MI MEMBRESÍA</button>
</nav>
<div id="main">
  <!-- MÓDULO ASISTENCIA -->
  <div id="mod-asist" class="mod act">
    <div class="card">
      <div class="ct">🥋 REGISTRAR ASISTENCIA</div>
      <div id="asist-form">
        <div class="sbar">
          <input id="asist-id" type="text" placeholder="Escribe tu ID (ej: DP-001)" autocomplete="off" inputmode="text">
          <button class="btn bs" onclick="regAsist()">✅ REGISTRAR</button>
        </div>
        <p style="font-size:.75rem;color:var(--text-muted);margin-top:.4rem">También puedes escanear tu credencial QR</p>
      </div>
      <div id="welcome" style="display:none">
        <h2 id="w-nom"></h2>
        <p id="w-dt" style="font-size:.75rem;color:var(--text-muted);margin:.3rem 0"></p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.9rem 0">
          <div class="kbox"><p>DÍAS RESTANTES</p><div class="val" id="w-dias">0</div></div>
          <div class="kbox gold"><p>VENCE</p><div class="val" id="w-vence">--</div></div>
        </div>
        <p class="motiv" id="w-mot"></p>
        <button class="btn bc" style="margin-top:1rem;width:100%;justify-content:center" onclick="resetAsist()">← NUEVA ASISTENCIA</button>
      </div>
    </div>
  </div>
  <!-- MÓDULO MEMBRESÍA -->
  <div id="mod-memb" class="mod">
    <div class="card">
      <div class="ct">🪪 CONSULTAR MEMBRESÍA</div>
      <div class="sbar">
        <input id="memb-q" type="text" placeholder="Tu ID o nombre" autocomplete="off">
        <button class="btn bsr" onclick="consMem()">🔍 BUSCAR</button>
      </div>
    </div>
    <div id="memb-res" style="display:none">
      <div class="mc">
        <img id="logo-memb" src="" style="width:50px;height:50px;object-fit:contain;margin-bottom:.4rem" alt="">
        <h2 id="m-nom"></h2>
        <p id="m-id" style="font-size:.75rem;color:var(--text-muted)"></p>
        <p id="m-plan" style="font-size:.8rem;color:var(--gold);margin:.3rem 0"></p>
        <div class="mdays" id="m-dias">0</div>
        <p style="font-size:.7rem;color:var(--text-muted)">DÍAS RESTANTES</p>
        <p style="font-size:.8rem;margin:.3rem 0">Vence: <strong id="m-vence"></strong></p>
        <div id="m-badge" style="margin-top:.4rem"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────────
const fbCfg={apiKey:"AIzaSyBQpVAEgBSoWcjriHl6xIhnWVIoG35MGOM",authDomain:"dojo-ponce-mma.firebaseapp.com",projectId:"dojo-ponce-mma"};
firebase.initializeApp(fbCfg);
const db=firebase.firestore();

// ── ESTADO ───────────────────────────────────────────────────────
let alumnos=[],asists=[];
const FRASES=["¡Tú puedes, sigue adelante!","La constancia es la clave del éxito.","Cada entrenamiento te hace más fuerte.","¡Excelente trabajo hoy!","El camino del guerrero es disciplina."];

// ── LOGO (base64 inline para no depender de archivos externos) ───
const LOGO_B64='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAYAAACtWK6eAAADhUlEQVR42u3BMQEAAADCoPVP7WsIoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMAAAAAAADgtwEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAAEAAf7rTQAAAABJRU5ErkJggg==';

// ── INIT ─────────────────────────────────────────────────────────
async function init(){
  // Poner logo (usamos el que ya viene en el header del sistema principal via Firebase Storage o el placeholder)
  document.getElementById('logo-img').src=LOGO_B64;
  document.getElementById('logo-memb').src=LOGO_B64;
  try{
    const snap=await db.collection('alumnos').where('estado','==','activo').get();
    alumnos=snap.docs.map(d=>({id:d.id,...d.data()}));
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const en3=new Date(hoy);en3.setDate(en3.getDate()+3);
  }catch(e){toast('Error de conexión',true);console.error(e);}
}

// ── NAVEGACIÓN ───────────────────────────────────────────────────
function showMod(mod,btn){
  document.querySelectorAll('.mod').forEach(m=>m.classList.remove('act'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('mod-'+mod).classList.add('act');
  btn.classList.add('active');
}

// ── REGISTRAR ASISTENCIA ─────────────────────────────────────────
async function regAsist(idOverride){
  const raw=(idOverride||document.getElementById('asist-id').value).trim().toUpperCase();
  const idBusq=raw.startsWith('DP-')?raw:'DP-'+raw;
  if(!idBusq||idBusq==='DP-'){toast('Ingresa tu ID',true);return;}
  const a=alumnos.find(x=>(x.alumnoId||'').toUpperCase()===idBusq);
  if(!a){toast('Alumno no encontrado',true);return;}
  const now=new Date();
  const hoyStr=now.toISOString().split('T')[0];
  // Verificar si ya registró hoy
  const yaHoy=asists.find(x=>x.alumnoId===a.alumnoId&&x.fecha===hoyStr);
  if(yaHoy){toast('Ya registraste asistencia hoy ✅');return;}
  try{
    const ad={alumnoId:a.alumnoId,nombre:a.nombre,apellidos:a.apellidos||'',fecha:hoyStr,hora:now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})};
    const r=await db.collection('asistencias').add(ad);
    asists.push({id:r.id,...ad});
    const hoyD=new Date();hoyD.setHours(0,0,0,0);
    const vence=a.fechaVencimiento?new Date(a.fechaVencimiento+'T12:00:00'):null;
    const dias=vence?Math.max(0,Math.ceil((vence-hoyD)/86400000)):0;
    document.getElementById('w-nom').textContent=`¡Hola, ${a.nombre}!`;
    document.getElementById('w-dt').textContent=now.toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' — '+now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('w-dias').textContent=dias;
    document.getElementById('w-vence').textContent=vence?fd(a.fechaVencimiento):'N/A';
    document.getElementById('w-mot').textContent=FRASES[Math.floor(Math.random()*FRASES.length)];
    document.getElementById('asist-form').style.display='none';
    document.getElementById('welcome').style.display='block';
  }catch(e){toast('Error al registrar',true);console.error(e);}
}

function resetAsist(){
  document.getElementById('asist-id').value='';
  document.getElementById('asist-form').style.display='block';
  document.getElementById('welcome').style.display='none';
}

// ── CONSULTAR MEMBRESÍA ──────────────────────────────────────────
function consMem(){
  const q=document.getElementById('memb-q').value.trim().toLowerCase();
  if(!q)return;
  const a=alumnos.find(x=>(x.alumnoId||'').toLowerCase()===q||`${x.nombre} ${x.apellidos||''}`.toLowerCase().includes(q));
  if(!a){toast('No encontrado',true);return;}
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const vence=a.fechaVencimiento?new Date(a.fechaVencimiento+'T12:00:00'):null;
  const dias=vence?Math.max(0,Math.ceil((vence-hoy)/86400000)):0;
  document.getElementById('m-nom').textContent=`${a.nombre} ${a.apellidos||''}`;
  document.getElementById('m-id').textContent=a.alumnoId;
  document.getElementById('m-plan').textContent=a.planActual?`Plan ${a.planActual}`:'Sin plan activo';
  const de=document.getElementById('m-dias');
  de.textContent=dias;de.className='mdays'+(dias<=3?' urg':'');
  document.getElementById('m-vence').textContent=fd(a.fechaVencimiento)||'N/A';
  let st='';
  if(!a.fechaVencimiento)st='<span class="sb se">SIN MEMBRESÍA</span>';
  else if(dias<=0)st='<span class="sb sv">VENCIDA</span>';
  else if(dias<=3)st='<span class="sb se">POR VENCER</span>';
  else st='<span class="sb sa">ACTIVA ✅</span>';
  document.getElementById('m-badge').innerHTML=st;
  document.getElementById('memb-res').style.display='block';
}

// ── UTILIDADES ───────────────────────────────────────────────────
function fd(str){
  if(!str)return'-';
  const d=new Date(str+'T12:00:00');
  return`${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function toast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(isErr?' err':'');
  setTimeout(()=>t.className='',3500);
}

// ── SCANNER QR (teclado del scanner físico) ──────────────────────
let qrBuf='',qrTmr=null;
document.addEventListener('keydown',e=>{
  clearTimeout(qrTmr);
  if(e.key==='Enter'&&qrBuf.length>2){regAsist(qrBuf);qrBuf='';}
  else if(e.key.length===1&&document.activeElement.id!=='asist-id'&&document.activeElement.id!=='memb-q'){
    qrBuf+=e.key;qrTmr=setTimeout(()=>qrBuf='',500);
  }
});

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
